{% extends "base.html" %}

{% block title %}Processing...{% endblock %}

{% block content %}
<div class="text-center py-5">
    <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
    <h4>Processing your request...</h4>
    <p class="text-muted" id="progress-text">Starting up...</p>
    <p class="text-muted small">This may take a minute for large searches. The page will redirect when complete.</p>
</div>
{% endblock %}

{% block scripts %}
<script>
    pollTask("{{ task_id }}");
</script>
{% endblock %}
