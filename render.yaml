services:
  - type: web
    name: prospect-explorer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 300
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: CACHE_ENABLED
        value: "1"
      - key: API_DELAY
        value: "0.5"
      - key: FLASK_DEBUG
        value: "0"
      - key: PYTHON_VERSION
        value: "3.11.0"
